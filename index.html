<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boca Juniors - Fuego Sagrado SWARM</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('./bombonera_bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #000;
      overflow: hidden;
      
      /* Optimizaciones para móviles (Responsive) */
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; /* Evita que la pantalla haga scroll al arrastrar el dedo */
    }
    canvas {
      display: block;
      mix-blend-mode: screen; 
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 5, 20, 0.6); 
      pointer-events: none; 
      z-index: -1; 
    }

    /* Estilos del botón REINICIAR (Cyberpunk Boca) */
    .btn-reiniciar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #f3b229; /* Oro Boca */
      background: rgba(16, 63, 121, 0.3); /* Azul Boca semitransparente */
      border: 2px solid #f3b229;
      border-radius: 4px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease-out;
      box-shadow: 0 0 15px rgba(243, 178, 41, 0.2);
      backdrop-filter: blur(4px); /* Efecto cristal / vidrio ahumado */
    }
    
    .btn-reiniciar:hover, .btn-reiniciar:active {
      background: rgba(16, 63, 121, 0.8);
      box-shadow: 0 0 25px rgba(243, 178, 41, 0.8), inset 0 0 15px rgba(243, 178, 41, 0.4);
      color: #ffffff;
      text-shadow: 0 0 8px #f3b229;
      border-color: #fff;
    }

    /* Ajuste responsive para el botón en celulares pequeños */
    @media (max-width: 600px) {
      .btn-reiniciar {
        bottom: 25px;
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
  <div class="overlay"></div>
  
  <!-- Botón de Reiniciar -->
  <button id="btn-reiniciar" class="btn-reiniciar" onclick="reiniciarEstado()">REINICIAR</button>

    // --- MANEJO DE EVENTOS PARA EL BOTÓN (Evita que el Canvas procese el clic) ---
    // Registramos los eventos antes de que p5.js los consuma.
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('btn-reiniciar');
      
      btn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
      btn.addEventListener('touchstart', function(e) { e.stopPropagation(); });
    });

    // Función que reinicia todo al estado cero
    function reiniciarEstado() {
      swarmShields = []; // Vaciamos los escudos creados
      particles = [];    // Vaciamos el fuego residual
      
      // Pintamos la pantalla de negro para borrar todo al instante
      blendMode(BLEND);
      background(0); 
    }

    function preload() {
      let encodedSVG = btoa(unescape(encodeURIComponent(escudoSVG)));
      imgEscudo = loadImage('data:image/svg+xml;base64,' + encodedSVG);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
    }

    function draw() {
      blendMode(BLEND);
      background(0, 0, 0, 0.2); 

      // targetX y targetY usan pwinMouseX/Y para evitar saltos raros al reiniciar o si el mouse no se movió
      let targetX = mouseX || width / 2;
      let targetY = mouseY || height / 2;

      for (let i = 0; i < 2; i++) {
        particles.push(new Particle(targetX, targetY));
      }

      for (let s of swarmShields) {
        let destX = targetX + s.offsetX;
        let destY = targetY + s.offsetY;
        
        s.x = lerp(s.x, destX, s.easing);
        s.y = lerp(s.y, destY, s.easing);
        
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(s.x, s.y));
        }
      }

      blendMode(ADD);

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.isDead()) {
          particles.splice(i, 1);
        }
      }

      blendMode(BLEND);
      
      if (imgEscudo) {
        imageMode(CENTER);
        
        for (let i = 0; i < swarmShields.length; i++) {
          let s = swarmShields[i];
          let floatY = s.y + sin(frameCount * 0.05 + i) * 5; 
          image(imgEscudo, s.x, floatY, 110, 130);
        }

        let floatY = targetY + sin(frameCount * 0.05) * 5;
        image(imgEscudo, targetX, floatY, 110, 130);
      }
    }

    // Adaptación "Responsive" para PC
    function mousePressed() {
      if (mouseButton === LEFT) {
        agregarEscudo(mouseX, mouseY);
      }
    }

    // Adaptación "Responsive" para móviles (Táctil)
    function touchStarted() {
      // P5.js usa touches[] para pantallas táctiles
      if (touches.length > 0) {
        agregarEscudo(touches[0].x, touches[0].y);
      }
      return false; // Evitar el scroll default al tocar la pantalla
    }

    function touchMoved() {
      return false; // Evitar scroll de la página al deslizar el dedo (responsive)
    }

    function agregarEscudo(posX, posY) {
      swarmShields.push({ 
        x: posX, 
        y: posY,
        // En móviles, el offset se ajusta según el ancho de la pantalla para que no se escapen
        offsetX: random(-min(120, width/3), min(120, width/3)),
        offsetY: random(-min(120, height/3), min(120, height/3)),
        easing: random(0.01, 0.06) 
      });
    }

    class Particle {
      constructor(x, y) {
        let angle = random(TWO_PI);
        let radius = random(5, 30);
        this.x = x + radius * cos(angle);
        this.y = y + radius * sin(angle);
        
        this.vx = random(-1.2, 1.2);
        this.vy = random(-3, -8); 
        
        this.life = 1.0;
        this.decay = random(0.02, 0.04); 
        this.size = random(15, 45);
        
        this.isBlue = random() > 0.5;
        this.h = this.isBlue ? 220 : 50; 
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.size += 0.5; 
        this.vx += random(-0.1, 0.1);
      }
      
      draw() {
        let alpha = max(0, this.life);
        
        fill(this.h, 100, 100, alpha * 0.2);
        circle(this.x, this.y, this.size * 1.5);
        
        fill(this.h, 50, 100, alpha * 0.6); 
        circle(this.x, this.y, this.size * 0.7);
      }
      
      isDead() {
        return this.life <= 0;
      }
    }

    // Responsive en PC (redimensionar ventana)
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
