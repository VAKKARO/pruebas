<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Horda Neón - Mobile Optimized</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      /* Optimizaciones Mobile estrictas */
      touch-action: none; 
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      /* Evita brillos al hacer tap en móviles */
      touch-action: none; 
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }
    #permissionBtn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid cyan;
      color: cyan;
      font-family: sans-serif;
      border-radius: 5px;
      cursor: pointer;
      z-index: 100;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
  <button id="permissionBtn" style="display:none;" onclick="requestAccess()">Habilitar Sensor de Movimiento</button>

  <script>
    let walkers = [];
    let isPanic = false;
    let spawnInterval;
    let timeOff = 0; 

    // MODO VÓRTICE Y TRACKING MÓVIL
    let pointerTimer = 0;
    let lastPointer;
    let isVortex = false;
    
    // VARIABLE GLOBAL PARA EL OBJETIVO
    let targetVector;

    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      document.getElementById('permissionBtn').style.display = 'block';
    }

    function requestAccess() {
      DeviceMotionEvent.requestPermission().then(response => {
        if (response == 'granted') {
          document.getElementById('permissionBtn').style.display = 'none';
        }
      });
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
      
      setShakeThreshold(30);

      // Bloqueo estricto del scroll a nivel de DOM para móviles
      document.body.addEventListener('touchmove', function(e) { 
        e.preventDefault(); 
      }, { passive: false });

      targetVector = createVector(width/2, height/2);
      lastPointer = createVector(width/2, height/2);

      for (let i = 0; i < 10; i++) {
        walkers.push(new Walker(random(width), random(height)));
      }

      spawnInterval = setInterval(() => {
        if (walkers.length < 150) { 
          let spawnX = random() > 0.5 ? random(-50, 0) : random(width, width + 50);
          let spawnY = random(height);
          walkers.push(new Walker(spawnX, spawnY));
        }
      }, 500);
    }

    function draw() {
      blendMode(BLEND);
      background(0, 0, 0, 0.08); 
      blendMode(ADD); 
      
      timeOff += 0.01; 

      // MODO VÓRTICE
      if (p5.Vector.dist(targetVector, lastPointer) < 5) {
        pointerTimer += deltaTime;
      } else {
        pointerTimer = 0;
        lastPointer = targetVector.copy();
      }
      isVortex = pointerTimer > 1000;

      // Actualización de Walkers
      for (let w of walkers) {
        if (isPanic) {
          w.flee(targetVector);
          w.isPanicking = true;
        } else if (isVortex) {
          w.orbit(targetVector);
          w.isPanicking = false;
        } else {
          w.arrive(targetVector);
          w.isPanicking = false;
        }
        
        w.separate(walkers);
        w.update();
        w.draw();
      }
    }

    // ==========================================
    // EVENTOS EXPLÍCITOS MOUSE Y TÁCTILES
    // ==========================================
    
    // Variables para lógica táctil avanzada
    let touchStartTime = 0;
    let touchStartPos = null;
    let touchHasMoved = false;

    function updateTargetFromMouse() {
      if (mouseX !== 0 || mouseY !== 0) {
        targetVector.set(mouseX, mouseY);
      }
    }

    function mouseMoved() {
      updateTargetFromMouse();
    }
    
    function mouseDragged() {
      updateTargetFromMouse();
      // Al arrastrar el mouse, garantizamos que siga y no huya
      isPanic = false;
    }

    function mousePressed() {
      updateTargetFromMouse();
      isPanic = true;
      if (navigator.vibrate) navigator.vibrate(20);
    }
    
    function mouseReleased() {
      isPanic = false;
    }
    
    function touchStarted() {
      if (touches.length > 0) {
        targetVector.set(touches[0].x, touches[0].y);
        touchStartPos = createVector(touches[0].x, touches[0].y);
      }
      touchStartTime = millis();
      touchHasMoved = false;
      
      // Long press detection: Si pasaron 200ms y el dedo sigue ahí sin moverse, pánico
      setTimeout(() => {
        if (!touchHasMoved && touches.length > 0) {
          isPanic = true;
          if (navigator.vibrate) navigator.vibrate(20);
        }
      }, 200);

      return false; // Prevenir default
    }
    
    function touchMoved() {
      if (touches.length > 0) {
        let currentTouch = createVector(touches[0].x, touches[0].y);
        targetVector.set(currentTouch.x, currentTouch.y);
        
        // Si el dedo se movió más de 10 píxeles, es un arrastre intencional (seguimiento)
        if (touchStartPos && p5.Vector.dist(currentTouch, touchStartPos) > 10) {
          touchHasMoved = true;
          isPanic = false; // El seguimiento siempre domina sobre el pánico
        }
      }
      return false; // Crucial para fluidez (bloquea el scroll del SO)
    }

    function touchEnded() {
      let touchDuration = millis() - touchStartTime;
      
      // Tap rápido: si soltó rápido y no se movió, es un tap de dispersión
      if (touchDuration < 200 && !touchHasMoved) {
        isPanic = true;
        if (navigator.vibrate) navigator.vibrate(20);
        
        // Finalizar el pánico automático después del tap
        setTimeout(() => {
          isPanic = false;
        }, 500);
      } else {
        // En cualquier otro caso (terminó de arrastrar o soltó el long press), calma
        isPanic = false;
      }
      
      return false;
    }

    // ==========================================
    // EXPLOSIÓN Y VIBRACIÓN
    // ==========================================
    function deviceShaken() {
      triggerExplosion();
      if (navigator.vibrate) navigator.vibrate([50, 50, 50]); 
    }

    function doubleClicked() {
      triggerExplosion();
    }

    function triggerExplosion() {
      let center = createVector(width/2, height/2);
      for (let i = walkers.length - 1; i >= 0; i--) {
        if (random() > 0.5) {
          walkers.splice(i, 1);
        } else {
          let explosionForce = p5.Vector.sub(walkers[i].pos, center);
          explosionForce.setMag(walkers[i].maxSpeed * 15);
          walkers[i].applyForce(explosionForce);
        }
      }
    }

    // ==========================================
    // CLASE WALKER
    // ==========================================
    class Walker {
      constructor(x, y) {
        this.pos = createVector(x, y);
        this.vel = createVector(random(-1, 1), random(-1, 1));
        this.acc = createVector(0, 0);
        
        this.r = random(1.5, 3.0); 
        this.maxSpeed = random(5, 9);
        this.maxForce = random(0.6, 1.5); 
        
        this.flapSpeed = random(0.4, 1.2);
        this.offset = random(1000); 
        this.noiseOffset = random(1000);
        
        let isPink = random() > 0.5;
        this.baseHue = isPink ? random(320, 340) : random(270, 290);
        this.isPanicking = false;
      }

      applyForce(force) {
        this.acc.add(force);
      }

      arrive(target) {
        let desired = p5.Vector.sub(target, this.pos);
        let d = desired.mag();
        let speed = this.maxSpeed;
        
        // SENSIBILIDAD MÓVIL OPTIMIZADA: Detectamos si es entorno móvil
        let isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        // Radio de suavizado mucho más indulgente en móviles
        let brakeRadius = isMobile ? 120 : 30;
        // Fuerza de atracción incrementada para compensar la fricción del dedo en pantallas táctiles
        let turningForce = isMobile ? 2.5 : 1.5;
        
        if (d < brakeRadius) {
          speed = map(d, 0, brakeRadius, 0, this.maxSpeed);
        }
        desired.setMag(speed);
        
        let steer = p5.Vector.sub(desired, this.vel);
        steer.limit(this.maxForce * turningForce); 
        this.applyForce(steer);

        let n = noise(this.noiseOffset, timeOff); 
        let angleOffset = map(n, 0, 1, -PI/1.5, PI/1.5); 
        
        let flutterForce = p5.Vector.fromAngle(this.vel.heading() + angleOffset);
        let flapIntensity = abs(sin(frameCount * this.flapSpeed + this.offset));
        flutterForce.mult(this.maxForce * 2 * flapIntensity); 
        
        this.applyForce(flutterForce);
      }

      orbit(target) {
        let desired = p5.Vector.sub(this.pos, target);
        let d = desired.mag();
        
        desired.rotate(PI / 2);
        
        let pull = p5.Vector.sub(target, this.pos);
        // Ajuste de radio de órbita más indulgente para mobile
        let orbitMax = touches.length > 0 ? 200 : 150;
        let orbitMin = touches.length > 0 ? 100 : 80;
        
        if (d > orbitMax) {
          pull.setMag(this.maxSpeed * 0.5); 
        } else if (d < orbitMin) {
          pull.setMag(-this.maxSpeed * 0.5); 
        } else {
          pull.setMag(0);
        }
        
        desired.setMag(this.maxSpeed * 1.5); 
        desired.add(pull);
        
        let steer = p5.Vector.sub(desired, this.vel);
        steer.limit(this.maxForce * 2.0); 
        this.applyForce(steer);
      }

      flee(target) {
        let desired = p5.Vector.sub(this.pos, target);
        let d = desired.mag();
        if (d < 500) {
          desired.setMag(this.maxSpeed * 3); 
          let steer = p5.Vector.sub(desired, this.vel);
          steer.limit(this.maxForce * 4); 
          this.applyForce(steer);
          
          let panicFlutter = p5.Vector.random2D().mult(this.maxForce * 5);
          this.applyForce(panicFlutter);
        }
      }

      separate(walkers) {
        let desiredSeparation = this.r * 3;
        let steer = createVector(0, 0);
        let count = 0;
        
        for (let other of walkers) {
          let d = p5.Vector.dist(this.pos, other.pos);
          if ((d > 0) && (d < desiredSeparation)) {
            let diff = p5.Vector.sub(this.pos, other.pos);
            diff.normalize();
            diff.div(d);
            steer.add(diff);
            count++;
          }
        }
        if (count > 0) {
          steer.div(count);
          steer.setMag(this.maxSpeed);
          steer.sub(this.vel);
          steer.limit(this.maxForce * 1.5);
          this.applyForce(steer);
        }
      }

      update() {
        this.vel.add(this.acc);
        let currentMaxSpeed = this.isPanicking ? this.maxSpeed * 3 : this.maxSpeed;
        if (isVortex && !this.isPanicking) currentMaxSpeed *= 1.5;
        
        this.vel.limit(currentMaxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        
        this.noiseOffset += 0.05;
        
        if (this.pos.x < -150) this.pos.x = width + 150;
        if (this.pos.x > width + 150) this.pos.x = -150;
        if (this.pos.y < -150) this.pos.y = height + 150;
        if (this.pos.y > height + 150) this.pos.y = -150;
      }

      draw() {
        let currentSpeed = this.vel.mag();
        let speedFactor = constrain(map(currentSpeed, this.maxSpeed * 0.5, this.maxSpeed * 2.0, 0, 1), 0, 1);
        let drawH, drawS, drawB;
        
        if (speedFactor < 0.7) {
          let transition = map(speedFactor, 0, 0.7, 0, 1);
          drawH = lerp(this.baseHue, 180, transition);
          drawS = 100;
          drawB = 100;
        } else {
          let transition = map(speedFactor, 0.7, 1.0, 0, 1);
          drawH = 180;
          drawS = lerp(100, 0, transition);
          drawB = 100;
        }

        if (this.isPanicking) {
          drawH = 0; drawS = 0; drawB = 100;
        }

        push();
        translate(this.pos.x, this.pos.y);
        
        let theta = this.vel.heading() + PI / 2;
        rotate(theta);

        fill(drawH, drawS, drawB, 0.1);
        circle(0, 0, this.r * 15);
        fill(drawH, drawS, drawB, 0.25);
        circle(0, 0, this.r * 6);

        let flap = sin(frameCount * this.flapSpeed + this.offset);
        let wingW = this.r * (1.0 + flap * 1.5); 
        let wingH = this.r * 2.8;

        fill(drawH, drawS, drawB, 0.85); 
        
        push(); rotate(-PI/7); ellipse(wingW/2, -wingH/3, wingW, wingH); pop();
        push(); rotate(PI/7); ellipse(-wingW/2, -wingH/3, wingW, wingH); pop();
        
        push(); rotate(PI/8); ellipse(wingW/2.2, wingH/2, wingW * 0.8, wingH * 0.9); pop();
        push(); rotate(-PI/8); ellipse(-wingW/2.2, wingH/2, wingW * 0.8, wingH * 0.9); pop();

        fill(255);
        ellipse(0, 0, this.r * 0.5, this.r * 3.5);

        pop();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
