<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horda Neón - Cyberpunk Background</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Filtro oscuro reducido para dejar ver más la ciudad de fondo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('cyberpunk_bg_dark.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            touch-action: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            mix-blend-mode: screen;
            /* Permite que el fondo negro de las estelas se vuelva transparente */
        }

        #permissionBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid cyan;
            color: cyan;
            font-family: sans-serif;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>

<body>
    <button id="permissionBtn" style="display:none;" onclick="requestAccess()">Habilitar Sensor de Movimiento</button>

    <script>
        let walkers = [];
        let isPanic = false;
        let spawnInterval;
        let timeOff = 0;

        // MODO AGUJERO NEGRO Y TRACKING MÓVIL
        let pointerTimer = 0;
        let lastPointer;
        let isBlackHole = false;
        let targetVector;

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            document.getElementById('permissionBtn').style.display = 'block';
        }

        function requestAccess() {
            DeviceMotionEvent.requestPermission().then(response => {
                if (response == 'granted') {
                    document.getElementById('permissionBtn').style.display = 'none';
                }
            });
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            noStroke();

            setShakeThreshold(30);

            document.body.addEventListener('touchmove', function (e) {
                e.preventDefault();
            }, { passive: false });

            targetVector = createVector(width / 2, height / 2);
            lastPointer = createVector(width / 2, height / 2);

            for (let i = 0; i < 10; i++) {
                walkers.push(new Walker(random(width), random(height)));
            }

            spawnInterval = setInterval(() => {
                if (walkers.length < 150) {
                    let spawnX = random() > 0.5 ? random(-50, 0) : random(width, width + 50);
                    let spawnY = random(height);
                    walkers.push(new Walker(spawnX, spawnY));
                }
            }, 500);
        }

        function draw() {
            blendMode(BLEND);

            // RECTÁNGULO NEGRO CON OPACIDAD PARA ESTELAS
            // Como el canvas tiene mix-blend-mode: screen, lo negro se ve transparente revelando el fondo
            fill(0, 0, 0, 10);
            rect(0, 0, width, height);

            // DIBUJAR CAMINANTES CON ADDITIVE BLENDING
            blendMode(ADD);
            timeOff += 0.01;

            let targetX = width / 2;
            let targetY = height / 2;

            if (touches.length > 0) {
                targetX = touches[0].x;
                targetY = touches[0].y;
            } else if (mouseX !== 0 || mouseY !== 0) {
                targetX = mouseX;
                targetY = mouseY;
            }

            let target = createVector(targetX, targetY);

            // MODO AGUJERO NEGRO
            let pointerActive = touches.length > 0 || mouseIsPressed;

            // Si el usuario presiona y se queda en el mismo lugar
            if (p5.Vector.dist(target, lastPointer) < 3 && pointerActive) {
                pointerTimer += deltaTime;
            } else {
                pointerTimer = 0;
                lastPointer = target.copy();
            }
            isBlackHole = pointerTimer > 500; // Activa tras 0.5 segundos

            // EFECTO VISUAL DEL AGUJERO NEGRO EN EL CENTRO
            if (isBlackHole) {
                push();
                drawingContext.shadowBlur = 30;
                drawingContext.shadowColor = 'white';
                fill(0); // Negro puro
                stroke(0, 0, 100, 100); // Blanco en HSB
                strokeWeight(2);
                circle(targetX, targetY, 20);
                pop();
            }

            // Actualización de Walkers
            for (let w of walkers) {
                if (isPanic) {
                    w.flee(targetVector);
                    w.isPanicking = true;
                } else if (isBlackHole) {
                    w.blackHole(targetVector);
                    w.isPanicking = false;
                } else {
                    w.arrive(targetVector);
                    w.isPanicking = false;
                }

                w.separate(walkers);
                w.update();
                w.draw();
            }
        }

        // ==========================================
        // EVENTOS EXPLÍCITOS MOUSE Y TÁCTILES
        // ==========================================
        let touchStartX = 0;
        let touchStartY = 0;
        let maybePanic = false;
        let isDragging = false;
        const THRESHOLD = 10;

        function updateTargetFromMouse() {
            if (mouseX !== 0 || mouseY !== 0) {
                targetVector.set(mouseX, mouseY);
            }
        }

        function mouseMoved() {
            updateTargetFromMouse();
        }

        function mouseDragged() {
            updateTargetFromMouse();
            isDragging = true;
            maybePanic = false;
            isPanic = false;
        }

        function mousePressed() {
            updateTargetFromMouse();
            touchStartX = mouseX;
            touchStartY = mouseY;
            maybePanic = true;
            isDragging = false;

            setTimeout(() => {
                if (maybePanic) triggerPanicBurst();
            }, 200);
        }

        function mouseReleased() {
            if (maybePanic) triggerPanicBurst();
            maybePanic = false;
            isDragging = false;
        }

        function touchStarted() {
            if (touches.length > 0) {
                targetVector.set(touches[0].x, touches[0].y);
                touchStartX = touches[0].x;
                touchStartY = touches[0].y;
            }
            maybePanic = true;
            isDragging = false;

            setTimeout(() => {
                if (maybePanic && touches.length > 0) {
                    isPanic = true;
                    if (navigator.vibrate) navigator.vibrate(20);
                }
            }, 200);

            return false;
        }

        function touchMoved() {
            if (touches.length > 0) {
                targetVector.set(touches[0].x, touches[0].y);

                let d = dist(touchStartX, touchStartY, touches[0].x, touches[0].y);
                if (d > THRESHOLD) {
                    maybePanic = false;
                    isDragging = true;
                    isPanic = false;
                }
            }
            return false;
        }

        function touchEnded() {
            if (maybePanic) {
                triggerPanicBurst();
            } else {
                isPanic = false;
            }

            maybePanic = false;
            isDragging = false;
            return false;
        }

        function triggerPanicBurst() {
            isPanic = true;
            if (navigator.vibrate) navigator.vibrate(20);
            setTimeout(() => { isPanic = false; }, 400);
        }

        // ==========================================
        // EXPLOSIÓN Y VIBRACIÓN
        // ==========================================
        function deviceShaken() {
            triggerExplosion();
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        }

        function doubleClicked() {
            triggerExplosion();
        }

        function triggerExplosion() {
            let center = createVector(width / 2, height / 2);
            for (let i = walkers.length - 1; i >= 0; i--) {
                if (random() > 0.5) {
                    walkers.splice(i, 1);
                } else {
                    let explosionForce = p5.Vector.sub(walkers[i].pos, center);
                    explosionForce.setMag(walkers[i].maxSpeed * 15);
                    walkers[i].applyForce(explosionForce);
                }
            }
        }

        // ==========================================
        // CLASE WALKER
        // ==========================================
        class Walker {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-1, 1), random(-1, 1));
                this.acc = createVector(0, 0);

                // Caminantes 50% más gruesos
                this.r = random(2.25, 4.5);
                this.maxSpeed = random(5, 9);
                this.maxForce = random(0.6, 1.5);

                this.flapSpeed = random(0.4, 1.2);
                this.offset = random(1000);
                this.noiseOffset = random(1000);

                this.hueValue = random(0, 360);
                this.hueSpeed = random(0.5, 1.5);

                this.isPanicking = false;
                this.vortexTransition = 0; // Para animar el color blanco suavemente
            }

            applyForce(force) {
                this.acc.add(force);
            }

            arrive(target) {
                let desired = p5.Vector.sub(target, this.pos);
                let d = desired.mag();
                let speed = this.maxSpeed;

                let isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                let brakeRadius = isMobile ? 120 : 30;
                let turningForce = isMobile ? 2.5 : 1.5;

                if (d < brakeRadius) {
                    speed = map(d, 0, brakeRadius, 0, this.maxSpeed);
                }
                desired.setMag(speed);

                let steer = p5.Vector.sub(desired, this.vel);
                steer.limit(this.maxForce * turningForce);
                this.applyForce(steer);

                let n = noise(this.noiseOffset, timeOff);
                let angleOffset = map(n, 0, 1, -PI / 1.5, PI / 1.5);

                let flutterForce = p5.Vector.fromAngle(this.vel.heading() + angleOffset);
                let flapIntensity = abs(sin(frameCount * this.flapSpeed + this.offset));
                flutterForce.mult(this.maxForce * 2 * flapIntensity);

                this.applyForce(flutterForce);
            }

            blackHole(target) {
                // 1. Fuerza hacia el centro
                let force = p5.Vector.sub(target, this.pos);
                force.normalize();
                force.mult(0.5 * this.maxForce); // Escalar al maxForce del caminante para consistencia
                this.applyForce(force);

                // 2. Fuerza Tangencial (Giro)
                let tangent = createVector(-force.y, force.x);
                tangent.mult(2.0 * this.maxForce);
                this.applyForce(tangent);

                // Fricción para que no escapen
                this.vel.mult(0.96);
            }

            flee(target) {
                let desired = p5.Vector.sub(this.pos, target);
                let d = desired.mag();
                if (d < 500) {
                    desired.setMag(this.maxSpeed * 3);
                    let steer = p5.Vector.sub(desired, this.vel);
                    steer.limit(this.maxForce * 4);
                    this.applyForce(steer);

                    let panicFlutter = p5.Vector.random2D().mult(this.maxForce * 5);
                    this.applyForce(panicFlutter);
                }
            }

            separate(walkers) {
                let desiredSeparation = this.r * 3;
                let steer = createVector(0, 0);
                let count = 0;

                for (let other of walkers) {
                    let d = p5.Vector.dist(this.pos, other.pos);
                    if ((d > 0) && (d < desiredSeparation)) {
                        let diff = p5.Vector.sub(this.pos, other.pos);
                        diff.normalize();
                        diff.div(d);
                        steer.add(diff);
                        count++;
                    }
                }
                if (count > 0) {
                    steer.div(count);
                    steer.setMag(this.maxSpeed);
                    steer.sub(this.vel);
                    steer.limit(this.maxForce * 1.5);
                    this.applyForce(steer);
                }
            }

            update() {
                this.vel.add(this.acc);
                let currentMaxSpeed = this.isPanicking ? this.maxSpeed * 3 : this.maxSpeed;
                if (isBlackHole && !this.isPanicking) currentMaxSpeed *= 1.5;

                this.vel.limit(currentMaxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                this.noiseOffset += 0.05;

                let colorSpeed = isDragging ? this.hueSpeed * 4 : this.hueSpeed;
                this.hueValue += colorSpeed;
                if (this.hueValue > 360) {
                    this.hueValue -= 360;
                }

                // Transición suave hacia el Blanco Neón
                if (isBlackHole && !this.isPanicking) {
                    this.vortexTransition = min(1, this.vortexTransition + 0.1);
                } else {
                    this.vortexTransition = max(0, this.vortexTransition - 0.1);
                }

                if (this.pos.x < -150) this.pos.x = width + 150;
                if (this.pos.x > width + 150) this.pos.x = -150;
                if (this.pos.y < -150) this.pos.y = height + 150;
                if (this.pos.y > height + 150) this.pos.y = -150;
            }

            draw() {
                let drawH = this.hueValue;
                let drawS = 100;
                let drawB = 100;

                // Modo Pánico fuerza el Blanco Nuclear
                if (this.isPanicking) {
                    drawH = 0; drawS = 0; drawB = 100;
                }
                // Transición suave hacia el Blanco Neón
                else if (this.vortexTransition > 0) {
                    drawS = lerp(100, 0, this.vortexTransition);
                }

                push();
                translate(this.pos.x, this.pos.y);

                let theta = this.vel.heading() + PI / 2;
                rotate(theta);

                // FEEDBACK VISUAL: Brillo neón más intenso si está direccionando
                let glowBoost = isDragging && !this.isPanicking ? 1.5 : 1.0;

                // Un leve aumento de brillo, no tan exagerado para que se note que el círculo está vacío
                glowBoost += this.vortexTransition * 0.5;

                fill(drawH, drawS, drawB, 10 * glowBoost);
                circle(0, 0, this.r * 15);
                fill(drawH, drawS, drawB, 25 * glowBoost);
                circle(0, 0, this.r * 6);

                let flap = sin(frameCount * this.flapSpeed + this.offset);
                let wingW = this.r * (1.0 + flap * 1.5);
                let wingH = this.r * 2.8;

                fill(drawH, drawS, drawB, min(100, 85 * glowBoost));

                push(); rotate(-PI / 7); ellipse(wingW / 2, -wingH / 3, wingW, wingH); pop();
                push(); rotate(PI / 7); ellipse(-wingW / 2, -wingH / 3, wingW, wingH); pop();

                push(); rotate(PI / 8); ellipse(wingW / 2.2, wingH / 2, wingW * 0.8, wingH * 0.9); pop();
                push(); rotate(-PI / 8); ellipse(-wingW / 2.2, wingH / 2, wingW * 0.8, wingH * 0.9); pop();

                fill(255);
                ellipse(0, 0, this.r * 0.5, this.r * 3.5);

                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>

</html>
