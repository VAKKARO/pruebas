<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Smoke Particle System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510; /* Fondo oscuro tipo ciberpunk */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 5px;
            font-weight: 800;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #e0e0e0;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <canvas id="smokeCanvas"></canvas>
    
    <div class="overlay">
        <h1>NEON SMOKE</h1>
        <p>Generative Cyberpunk Particles</p>
    </div>

    <script>
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimización: desactivar canal alfa en el contexto si es opaco

        let width, height;
        let particles = [];

        // Configuración
        const particleCount = 250;
        const colors = [
            '#ff007f', // Rosa neón
            '#ff00ff', // Magenta
            '#bf00ff', // Púrpura eléctrico
            '#f70044'  // Rojo neón
        ];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = width / 2 + (Math.random() - 0.5) * 100;
                this.y = height / 2 + (Math.random() - 0.5) * 100;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = Math.random() * 0.5 + 0.5; // vida entre 0.5 y 1.0
                this.decay = Math.random() * 0.005 + 0.002;
                this.size = Math.random() * 40 + 10;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Rotación aleatoria para dar más dinamismo al "humo"
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.angle += this.spin;
                this.size += 0.2; // El humo se expande lentamente

                // Ligeras fuerzas (viento/gravedad inversa)
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy -= 0.01; // Flota hacia arriba

                if (this.life <= 0 || this.size > 150) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Crear gradiente radial para simular humo suave y brillante
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                
                // Para el efecto neón, convertimos el color HEX a RGB para manipular su opacidad
                const r = parseInt(this.color.slice(1, 3), 16);
                const g = parseInt(this.color.slice(3, 5), 16);
                const b = parseInt(this.color.slice(5, 7), 16);

                const alpha = Math.max(0, this.life); // Evitar alpha negativo
                
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha * 0.8})`);
                gradient.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // Inicializar partículas
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
            // Pre-simular algunas partículas para que la pantalla no empiece vacía
            particles[i].life = Math.random();
            particles[i].x += (Math.random() - 0.5) * width;
            particles[i].y += (Math.random() - 0.5) * height;
        }

        // Bucle de animación optimizado
        function animate() {
            // Fondo oscuro semitransparente para dejar estelas
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 16, 0.2)'; 
            ctx.fillRect(0, 0, width, height);

            // 'lighter' crea el efecto aditivo brillante (neón/fuego)
            ctx.globalCompositeOperation = 'lighter';

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
