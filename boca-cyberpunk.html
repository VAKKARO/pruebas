      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #000; /* Respaldo */
      overflow: hidden;
    }
    canvas {
      display: block;
      /* ¡Magia CSS! mix-blend-mode "screen" hace que todo lo negro del Canvas sea transparente

      mix-blend-mode: screen;

    /* Agregamos una sutil capa oscura encima del estadio para que el neón resalte más */

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 5, 20, 0.6); /* Tinte azul muy oscuro y semitransparente */
      pointer-events: none; /* Deja pasar los clics al canvas */
      z-index: -1; /* Para que quede debajo del canvas */
    }

    function preload() {
      let encodedSVG = btoa(unescape(encodeURIComponent(escudoSVG)));
      imgEscudo = loadImage('data:image/svg+xml;base64,' + encodedSVG);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
    }

    function draw() {
      blendMode(BLEND);
      // OJO ACÁ: Ahora usamos negro puro (0,0,0) porque con el CSS mix-blend-mode: screen, 
      // el negro se vuelve totalmente transparente, dejando ver La Bombonera.
      // El 0.2 es la transparencia de este pintado para crear el efecto "estela".
      background(0, 0, 0, 0.2); 

      let targetX = mouseX || width / 2;
      let targetY = mouseY || height / 2;

      for (let i = 0; i < 2; i++) {
        particles.push(new Particle(targetX, targetY));
      }

      for (let s of swarmShields) {
        let destX = targetX + s.offsetX;
        let destY = targetY + s.offsetY;
        
        s.x = lerp(s.x, destX, s.easing);
        s.y = lerp(s.y, destY, s.easing);
        
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(s.x, s.y));
        }
      }

      blendMode(ADD);

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.isDead()) {
          particles.splice(i, 1);
        }
      }

      blendMode(BLEND);
      
      if (imgEscudo) {
        imageMode(CENTER);
        
        for (let i = 0; i < swarmShields.length; i++) {
          let s = swarmShields[i];
          let floatY = s.y + sin(frameCount * 0.05 + i) * 5; 
          image(imgEscudo, s.x, floatY, 110, 130);
        }

        let floatY = targetY + sin(frameCount * 0.05) * 5;
        image(imgEscudo, targetX, floatY, 110, 130);
      }
    }

    function mousePressed() {
      if (mouseButton === LEFT) {
        swarmShields.push({ 
          x: mouseX, 
          y: mouseY,
          offsetX: random(-120, 120),
          offsetY: random(-120, 120),
          easing: random(0.01, 0.06) 
        });
      }
    }

    class Particle {
      constructor(x, y) {
        let angle = random(TWO_PI);
        let radius = random(5, 30);
        this.x = x + radius * cos(angle);
        this.y = y + radius * sin(angle);
        
        this.vx = random(-1.2, 1.2);
        this.vy = random(-3, -8); 
        
        this.life = 1.0;
        this.decay = random(0.02, 0.04); 
        this.size = random(15, 45);
        
        this.isBlue = random() > 0.5;
        this.h = this.isBlue ? 220 : 50; 
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.size += 0.5; 
        this.vx += random(-0.1, 0.1);
      }
      
      draw() {
        let alpha = max(0, this.life);
        
        fill(this.h, 100, 100, alpha * 0.2);
        circle(this.x, this.y, this.size * 1.5);
        
        fill(this.h, 50, 100, alpha * 0.6); 
        circle(this.x, this.y, this.size * 0.7);
      }
      
      isDead() {
        return this.life <= 0;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
